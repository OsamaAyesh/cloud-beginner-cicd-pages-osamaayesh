name: CI/CD — Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Validate
  # ─────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project files exist
        run: |
          echo "Checking required files..."
          test -f index.html && echo "  index.html   - FOUND" || (echo "  index.html   - MISSING" && exit 1)
          test -f style.css  && echo "  style.css    - FOUND" || (echo "  style.css    - MISSING" && exit 1)
          test -f script.js  && echo "  script.js    - FOUND" || (echo "  script.js    - MISSING" && exit 1)
          echo "All required files verified."

      - name: Validate HTML structure
        run: |
          echo "Validating HTML..."
          grep -q "<!DOCTYPE html>" index.html && echo "  DOCTYPE declaration - OK"
          grep -q "<html"           index.html && echo "  <html> tag          - OK"
          grep -q "<head"           index.html && echo "  <head> section      - OK"
          grep -q "<body"           index.html && echo "  <body> section      - OK"
          grep -q "style.css"       index.html && echo "  CSS link            - OK"
          grep -q "script.js"       index.html && echo "  JS link             - OK"
          echo "HTML validation passed."

      - name: Check file sizes
        run: |
          echo "File size report:"
          wc -l index.html style.css script.js
          du -sh index.html style.css script.js

  # ─────────────────────────────────────────
  # JOB 2: Deploy to gh-pages branch
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,README.md'

      - name: Print live URL
        run: |
          echo "Deployment complete!"
          echo "Live site: https://OsamaAyesh.github.io/cloud-beginner-cicd-pages-osamaayesh/"
